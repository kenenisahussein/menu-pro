<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Premium Cafe Menu</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

    <header>

        <div class="logo">☕ Premium Cafe</div>

        <nav>

            <a href="index.html" data-i18n="home">Home</a>
            <a href="about.html" data-i18n="about">About</a>

            <select id="languageSwitcher">
                <option value="en">English</option>
                <option value="am">አማርኛ</option>
                <option value="or">Afaan Oromo</option>
            </select>

        </nav>

    </header>


    <section class="hero">

        <video autoplay muted loop class="hero-video">
            <source src="video/cafe.mp4" type="video/mp4">
        </video>

        <div class="hero-content">
            <h1 data-i18n="heroTitle">Welcome to Premium Cafe</h1>
            <p data-i18n="heroSubtitle">Fresh food & drinks everyday</p>
        </div>

    </section>


    <section class="filters">

        <button onclick="filterMenu('all')">All</button>
        <button onclick="filterMenu('pizza')">Pizza</button>
        <button onclick="filterMenu('drinks')">Drinks</button>
        <button onclick="filterMenu('juice')">Juice</button>
        <button onclick="filterMenu('dessert')">Dessert</button>

    </section>


    <section id="menuContainer" class="menu-container"></section>


    <footer>

        <p>© 2026 Premium Cafe</p>

    </footer>

    <script src="translations.js"></script>
    <script src="script.js"></script>

</body>

</html>
