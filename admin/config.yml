backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "menu"
    label: "Menu Items"
    folder: "data"
    create: true
    slug: "{{slug}}"

    fields:
      - { label: "Name", name: "name", widget: "string" }

      - { label: "Description", name: "description", widget: "string" }

      - { label: "Price", name: "price", widget: "number" }

      - label: "Category"
        name: "category"
        widget: "select"
        options: ["pizza", "drinks", "juice", "dessert"]
